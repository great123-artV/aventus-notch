    <style>
      /* Hide the default Google Translate bar */
      .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon {
        display: none !important;
      }
      body {
        top: 0px !important;
      }
      .goog-te-gadget-simple {
        background-color: transparent !important;
        border: none !important;
        padding: 0 !important;
        cursor: pointer;
      }
      .goog-te-menu-value {
        display: none !important;
      }
      #google_translate_element {
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="google_translate_element"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,es,fr,de,it,pt,zh-CN,ja,ko,ru,ar,hi,tr,nl,pl,sv,vi,id,uk,el,sv,no,da,fi,th,iw,bn,cs,hu,ro,sk,ms,tl,af,am,az,be,bg,ca,hr,eo,et,ka,gu,ht,ga,kn,la,lv,lt,mk',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');

        // Function to set the Google Translate cookie
        function setGoogleTranslateCookie(lang) {
          const domain = window.location.hostname;
          const cookieValue = `/en/${lang}`;
          document.cookie = `googtrans=${cookieValue}; path=/`;
          document.cookie = `googtrans=${cookieValue}; domain=.${domain}; path=/`;
          // Handle cases like localhost or subdomains
          const domainParts = domain.split('.');
          if (domainParts.length > 2) {
            const rootDomain = domainParts.slice(-2).join('.');
            document.cookie = `googtrans=${cookieValue}; domain=.${rootDomain}; path=/`;
          }
        }

        // Check for saved language and apply it once Google Translate is ready
        const applySavedLang = () => {
          const savedLang = localStorage.getItem("app-lang");
          if (savedLang && savedLang !== 'en') {
            setGoogleTranslateCookie(savedLang);
            const combo = document.querySelector('.goog-te-combo');
            if (combo) {
              combo.value = savedLang;
              combo.dispatchEvent(new Event('change'));
              return true;
            }
          }
          return false;
        };

        const checkInterval = setInterval(() => {
          if (applySavedLang()) {
            clearInterval(checkInterval);
          }
        }, 500);
        // Stop checking after 20 seconds to avoid infinite loop
        setTimeout(() => clearInterval(checkInterval), 20000);

        // Add a mutation observer to ensure the combo box is handled correctly
        const observer = new MutationObserver((mutations) => {
          const combo = document.querySelector('.goog-te-combo');
          const savedLang = localStorage.getItem("app-lang");
          if (combo && savedLang && savedLang !== 'en' && combo.value !== savedLang) {
            combo.value = savedLang;
            combo.dispatchEvent(new Event('change'));
          }
        });

        observer.observe(document.body, {
          childList: true,
          subtree: true
        });
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
